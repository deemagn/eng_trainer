<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>English Trainer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <button class="nav-burger" id="nav-burger" aria-label="Меню">
            <span></span><span></span><span></span>
        </button>
        <span class="nav-logo">English Trainer</span>
        <div class="nav-tabs" id="nav-tabs">
            <button class="nav-tab active" data-page="cards">Карточки</button>
            <button class="nav-tab" data-page="sentences">Диалоги</button>
            <button class="nav-tab" data-page="tasks">Задания</button>
        </div>
        <div class="nav-auth" id="nav-auth"></div>
    </nav>

    <!-- Карточки -->
    <section id="page-cards" class="page active">
        <p id="subtitle" class="page-subtitle"></p>

        <div class="tabs">
            <button class="tab-btn active" id="btn-verbs">Глаголы</button>
            <button class="tab-btn" id="btn-new">Новое</button>
            <button class="tab-btn" id="btn-hard">Сложное</button>
        </div>
        <div class="verb-filter" id="verb-filter">
            <button class="verb-filter-btn active" data-filter="all">Все</button>
            <button class="verb-filter-btn" data-filter="irregular">Неправильные</button>
            <button class="verb-filter-btn" data-filter="learned">Выученные</button>
        </div>

        <label class="eng-toggle" id="eng-toggle" title="Английский всегда первым">
            <input type="checkbox" id="eng-first-toggle">
            <span class="eng-toggle-slider"></span>
            <span class="eng-toggle-label">Eng first</span>
        </label>

        <div class="cards-empty" id="cards-empty" style="display:none">
            <p class="cards-empty-text" id="cards-empty-text"></p>
        </div>

        <div class="card-container" id="card-wrapper">
            <div class="card" id="card-element">
                <div class="card-face">
                    <div class="card-badge" id="card-badge">Глагол</div>
                    <h2 id="text-front">...</h2>
                    <span class="card-hint">нажмите, чтобы перевернуть</span>
                </div>
                <div class="card-face card-back" id="text-back"></div>
            </div>
        </div>

        <button class="speak-btn speak-btn--card" id="btn-speak" style="display:none" title="Озвучить">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
        </button>

        <div class="learned-list" id="learned-list" style="display:none"></div>

        <div class="counter" id="counter"></div>

        <button class="btn-next" id="btn-next-item">Следующая →</button>
        <button class="btn-learned-action" id="btn-learned-action" style="display:none">Выучено</button>
        <button class="btn-list" id="btn-show-list">Весь список</button>

        <p class="keyboard-hint">
            <kbd>Пробел</kbd> следующая &nbsp; <kbd>Enter</kbd> перевернуть
        </p>
    </section>

    <!-- Диалоги -->
    <section id="page-sentences" class="page dialogue-page">
        <div class="dialogue-header">
            <button class="dialogue-nav-btn" id="dial-prev">←</button>
            <h2 class="dialogue-title" id="dial-title"></h2>
            <button class="dialogue-nav-btn" id="dial-next">→</button>
        </div>
        <p class="dialogue-counter" id="dial-counter"></p>
        <div class="dialogue-list" id="dialogue-list"></div>
    </section>

    <!-- Задания — список -->
    <section id="page-tasks" class="page tasks-list-page">
        <p class="page-subtitle">Выбери задание</p>
        <div class="tasks-list" id="tasks-list"></div>
    </section>

    <!-- Задания — активное задание -->
    <section id="page-task-view" class="page task-view-page">
        <div class="task-view-header">
            <button class="back-btn" id="task-back-btn">← Задания</button>
        </div>
        <div id="task-view-content" class="task-view-content"></div>
    </section>

    <!-- Модальное окно (глобальное) -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button class="modal-close" id="modal-close">✕</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- Auth modal (content injected dynamically to avoid iOS Safari password prompt) -->
    <div class="auth-overlay" id="auth-overlay">
        <div class="auth-modal" id="auth-modal-content"></div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
