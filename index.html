<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>English Trainer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <span class="nav-logo">English Trainer</span>
        <div class="nav-tabs">
            <button class="nav-tab active" data-page="cards">Карточки</button>
            <button class="nav-tab" data-page="sentences">Предложения</button>
        </div>
    </nav>

    <!-- Карточки -->
    <section id="page-cards" class="page active">
        <p id="subtitle" class="page-subtitle"></p>

        <div class="tabs">
            <button class="tab-btn active" id="btn-verbs">Глаголы</button>
            <button class="tab-btn" id="btn-hard">Сложные</button>
            <button class="tab-btn" id="btn-phrases">Фразы</button>
            <button class="tab-btn" id="btn-markers">Маркеры</button>
        </div>

        <div class="card-container" id="card-wrapper">
            <div class="card" id="card-element">
                <div class="card-face">
                    <div class="card-badge" id="card-badge">Глагол</div>
                    <h2 id="text-front">...</h2>
                    <span class="card-hint">нажмите, чтобы перевернуть</span>
                </div>
                <div class="card-face card-back" id="text-back"></div>
            </div>
        </div>

        <div class="counter" id="counter"></div>

        <button class="btn-next" id="btn-next-item">Следующая →</button>
        <button class="btn-list" id="btn-show-list">Весь список</button>

        <p class="keyboard-hint">
            <kbd>Пробел</kbd> следующая &nbsp; <kbd>Enter</kbd> перевернуть
        </p>
    </section>

    <!-- Предложения -->
    <section id="page-sentences" class="page">
        <p id="sent-subtitle" class="page-subtitle"></p>

        <div class="card-container sent-card-container" id="sent-card-wrapper">
            <div class="card" id="sent-card-element">
                <div class="card-face">
                    <h2 id="sent-text-front">...</h2>
                    <span class="card-hint">нажмите, чтобы перевернуть</span>
                </div>
                <div class="card-face card-back" id="sent-text-back"></div>
            </div>
        </div>

        <div class="counter" id="sent-counter"></div>

        <button class="btn-next" id="sent-btn-next">Следующая →</button>

        <p class="keyboard-hint">
            <kbd>Пробел</kbd> следующая &nbsp; <kbd>Enter</kbd> перевернуть
        </p>
    </section>

    <!-- Модальное окно (глобальное) -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button class="modal-close" id="modal-close">✕</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
